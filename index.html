<style>
body { overflow-x: hidden; }

/* --- Landing --- */
.hero-wrap { position:relative; height:100vh; overflow:hidden; }
.hero-bg {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  transition: opacity 1.6s ease-in-out;
  filter: grayscale(0.25) contrast(1.05);
}
.hero-overlay {
  position:absolute; inset:0;
  background: linear-gradient(180deg,
    rgba(10,9,8,0.28) 0%,
    rgba(10,9,8,0.08) 35%,
    rgba(10,9,8,0.72) 80%,
    rgba(10,9,8,0.95) 100%
  );
}
.hero-content {
  position:absolute; inset:0;
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:0 48px 56px;
  z-index:2;
}
.hero-meta-bar {
  display:flex; justify-content:space-between; align-items:flex-end;
}
.pill {
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 14px;
  border:1px solid rgba(244,241,234,0.25);
  backdrop-filter:blur(6px);
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--ink-dim);
}
.pill .dot { width:6px; height:6px; border-radius:3px; background:var(--accent); animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Slide dots */
.slide-dots { display:flex; gap:8px; }
.slide-dot {
  width:22px; height:2px;
  background:rgba(244,241,234,0.28);
  border:none; padding:0; cursor:pointer;
  transition:background 300ms, width 300ms;
}
.slide-dot.is-active { background:var(--accent); width:38px; }

/* Marquee strip */
.marquee-strip {
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  background:rgba(10,9,8,0.72);
  backdrop-filter:blur(6px);
  overflow:hidden; padding:16px 0;
}
.marquee-inner { display:flex; gap:64px; animation:marquee 70s linear infinite; white-space:nowrap; }
@keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.marquee-item {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:0.26em; text-transform:uppercase;
  color:var(--ink-dim);
  display:inline-flex; align-items:center; gap:24px;
}
.marquee-item span { color:var(--ink-mute); }
.marquee-divider { color:var(--line-2); }

/* --- Nav --- */
.site-nav {
  position:fixed; top:0; left:0; right:0; z-index:60;
  display:flex; justify-content:space-between; align-items:center;
  padding:24px 48px;
  transition: background 400ms, backdrop-filter 400ms, border-color 400ms, padding 400ms;
  border-bottom:1px solid transparent;
}
.site-nav.scrolled {
  background:rgba(10,9,8,0.82);
  backdrop-filter:blur(12px) saturate(140%);
  -webkit-backdrop-filter:blur(12px) saturate(140%);
  border-bottom-color:var(--line);
  padding:18px 48px;
}
.site-nav .brand {
  font-family:'JetBrains Mono',monospace;
  font-weight:700; font-size:12px;
  letter-spacing:0.32em; text-transform:uppercase;
  color:var(--ink); cursor:pointer;
}
.site-nav ul { list-style:none; margin:0; padding:0; display:flex; gap:36px; }
.site-nav a {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--ink-dim); text-decoration:none;
  position:relative;
  transition:color 200ms;
}
.site-nav a.is-active { color:var(--ink); }
.site-nav a.is-active::after {
  content:''; position:absolute; bottom:-5px; left:0; right:0;
  height:1px; background:var(--accent);
}
.site-nav a:hover { color:var(--accent); }

/* --- Page transitions --- */
.page-view { opacity:0; transition:opacity 500ms ease; }
.page-view.is-shown { opacity:1; }

/* --- Portfolio --- */
.pf-grid {
  display:grid; grid-template-columns:260px 1fr;
  min-height:calc(100vh - 0px);
}
.pf-sidebar {
  position:sticky; top:0; height:100vh;
  overflow-y:auto; overflow-x:hidden;
  border-right:1px solid var(--line);
  padding:0;
  background:var(--bg);
  scrollbar-width:none;
}
.pf-sidebar::-webkit-scrollbar { display:none; }
.pf-sidebar-head {
  padding:90px 28px 24px;
  border-bottom:1px solid var(--line);
}
.work-item {
  padding:20px 28px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:background 200ms;
  position:relative;
}
.work-item:hover { background:var(--bg-2); }
.work-item.is-active { background:var(--bg-2); }
.work-item.is-active::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:2px; background:var(--accent);
}
.work-num {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--ink-mute);
  letter-spacing:0.2em; text-transform:uppercase;
  margin-bottom:6px;
}
.work-title { font-size:16px; letter-spacing:-0.01em; line-height:1.2; }
.work-year {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--ink-mute); margin-top:5px;
}

.case-study { padding-bottom:80px; }
.case-hero {
  position:relative; height:88vh;
  overflow:hidden;
}
.case-hero-img {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  filter:grayscale(0.15) contrast(1.05);
}
.case-hero-overlay {
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(10,9,8,0.1) 0%, rgba(10,9,8,0.8) 100%);
}
.case-hero-text {
  position:absolute; bottom:0; left:0; right:0;
  padding:56px 56px 48px;
}
.case-meta-grid {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:0;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.case-meta-cell {
  padding:24px 32px;
  border-right:1px solid var(--line);
}
.case-meta-cell:last-child { border-right:none; }
.case-meta-label {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--ink-mute);
  letter-spacing:0.22em; text-transform:uppercase; margin-bottom:8px;
}
.case-meta-value { font-size:15px; color:var(--ink); }

/* Gallery */
.gallery-grid {
  display:grid; gap:3px;
}
.gallery-grid.cols-2 { grid-template-columns:2fr 1fr; }
.gallery-grid.cols-3 { grid-template-columns:repeat(3,1fr); }
.gallery-img {
  aspect-ratio:16/10;
  background-size:cover; background-position:center;
  filter:grayscale(0.1);
  transition:filter 400ms, transform 400ms;
  overflow:hidden;
}
.gallery-img:hover { filter:none; }

/* --- About --- */
.about-statement {
  padding:160px 48px 72px;
  border-bottom:1px solid var(--line);
}
.about-body {
  display:grid; grid-template-columns:1.1fr 1fr;
  gap:56px;
  padding:80px 48px;
}
.resume-row {
  display:grid; grid-template-columns:64px 2fr 1.2fr;
  gap:20px;
  padding:16px 0;
  border-bottom:1px solid var(--line);
  align-items:baseline;
}

/* --- Contact --- */
.contact-grid {
  display:grid; grid-template-columns:1fr 1.1fr;
  min-height:calc(100vh - 80px);
}
.contact-img {
  position:relative;
  background-size:cover; background-position:center;
  filter:grayscale(0.3) contrast(1.05);
  overflow:hidden;
}
.contact-img-overlay {
  position:absolute; inset:0;
  background:linear-gradient(45deg, rgba(10,9,8,0.7) 0%, rgba(10,9,8,0.15) 100%);
}
.contact-form { padding:80px 56px; }
.contact-links { margin-bottom:48px; }
.contact-link-row {
  display:grid; grid-template-columns:110px 1fr;
  gap:16px;
  padding:18px 0;
  border-bottom:1px solid var(--line);
  align-items:baseline;
}
.contact-link-key {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--ink-mute);
  letter-spacing:0.24em; text-transform:uppercase;
}
.contact-link-val {
  font-size:18px; color:var(--ink); text-decoration:none;
  transition:color 200ms;
}
a.contact-link-val:hover { color:var(--accent); }
.form-field {
  padding:18px 0; border-bottom:1px solid var(--line);
  margin-bottom:0;
}
.form-label {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--ink-mute);
  letter-spacing:0.22em; text-transform:uppercase;
  display:block; margin-bottom:8px;
}
.form-input, .form-textarea {
  width:100%; background:transparent; border:none;
  color:var(--ink); font-family:inherit; font-size:17px;
  outline:none; padding:0; resize:none;
}
.form-textarea { min-height:90px; }

/* --- Footer --- */
.footer {
  border-top:1px solid var(--line);
  background:var(--bg-2);
  padding:56px 48px 40px;
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:32px;
}
.footer-bottom {
  margin-top:48px; padding-top:20px;
  border-top:1px solid var(--line);
  display:flex; justify-content:space-between;
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--ink-mute);
  letter-spacing:0.2em; text-transform:uppercase;
  grid-column:1/-1;
}

/* Tweaks */
.tweaks-panel {
  position:fixed; bottom:24px; right:24px; z-index:200;
  background:rgba(16,15,13,0.96);
  backdrop-filter:blur(12px);
  border:1px solid var(--line-2);
  padding:20px 22px;
  width:260px;
  display:none;
}
.tweaks-panel.open { display:block; }
.tweaks-title {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--ink-mute); margin:0 0 16px;
  display:flex; justify-content:space-between; align-items:center;
}
.tweaks-close { background:none; border:none; color:var(--ink-mute); cursor:pointer; font-size:16px; padding:0; }
.tweak-row { padding:12px 0; border-top:1px solid var(--line); }
.tweak-label { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--ink-dim); letter-spacing:0.2em; text-transform:uppercase; display:block; margin-bottom:10px; }
.swatch-row { display:flex; gap:8px; }
.swatch {
  width:24px; height:24px; border-radius:50%; border:1px solid var(--line-2);
  cursor:pointer; padding:0; transition:outline 150ms;
}
.swatch.active { outline:2px solid var(--ink); outline-offset:2px; }
.toggle-row { display:flex; gap:4px; }
.tog-btn {
  flex:1; padding:7px 8px;
  background:transparent; border:1px solid var(--line-2);
  color:var(--ink-mute); font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer;
  transition:background 150ms, color 150ms;
}
.tog-btn.on { background:var(--ink); color:var(--bg); border-color:var(--ink); }
</style>
</head>

function Contact() {
  const { lang, t } = useLang();
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);
  const [error, setError] = useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setSending(true);
    setError(null);
    const data = new FormData(e.target);
    try {
      const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' },
      });
      if (res.ok) { setSent(true); }
      else { setError(lang === 'es' ? 'Error al enviar. Intenta de nuevo.' : 'Failed to send. Please try again.'); }
    } catch {
      setError(lang === 'es' ? 'Error de conexión.' : 'Connection error.');
    }
    setSending(false);
  };

  return (
    <div style={{ paddingTop: 80 }}>
      <div className="contact-grid">
        <div className="contact-img"
          style={{ backgroundImage: `url(${IMGS.sirena[2]})`, minHeight: 600 }}>
          <div className="contact-img-overlay" />

            </div>
            <div className="mono" style={{ fontSize: 10, color: 'var(--ink-dim)', letterSpacing: '0.22em', textTransform: 'uppercase', marginTop: 20, whiteSpace: 'pre-line' }}>
              {t.contact_open}
            </div>
          </div>
        </div>

        <div className="contact-form">
          <div className="eyebrow mute" style={{ marginBottom: 32 }}>{t.contact_get}</div>

          <div className="contact-links">
            {[
              [t.contact_email, 'ptobarmiranda@gmail.com', 'mailto:ptobarmiranda@gmail.com'],
              [t.contact_ig, '@paztobarmiranda', 'https://instagram.com/paztobarmiranda'],
              [t.contact_loc, t.contact_location, null],
            ].map(([k, v, href]) => (
              <div key={k} className="contact-link-row">
                <span className="contact-link-key">{k}</span>
                {href
                  ? <a href={href} className="contact-link-val">{v}</a>
                  : <span className="contact-link-val">{v}</span>}
              </div>
            ))}
          </div>

          <div className="eyebrow mute" style={{ marginBottom: 0 }}>{t.contact_or}</div>

          {sent ? (
            <div style={{ padding: '48px 0', fontSize: 22, color: 'var(--accent)' }}>
              {t.contact_sent}
            </div>
          ) : (
            <form onSubmit={handleSubmit}>
              <div className="form-field">
                <label className="form-label">{t.contact_name}</label>
                <input className="form-input" name="name" required placeholder="" />
              </div>
              <div className="form-field">
                <label className="form-label">{t.contact_email_label}</label>
                <input className="form-input" name="email" type="email" required placeholder="" />
              </div>
              <div className="form-field">
                <label className="form-label">{t.contact_msg}</label>
                <textarea className="form-textarea" name="message" required />
              </div>
              {error && <div style={{ color: 'var(--accent)', fontSize: 13, marginTop: 12 }}>{error}</div>}
              <button type="submit" className="btn" style={{ marginTop: 28, opacity: sending ? 0.5 : 1 }} disabled={sending}>
                {sending ? '...' : t.contact_send}
              </button>
            </form>
          )}

      </div>
    </div>
  );
}

// ── Tweaks ────────────────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweaks }) {
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const set = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const accents = ['#d9c9a8','#c65a3a','#a8b9c9','#8a6f4e','#c4c9a8'];

  return (
    <div className={`tweaks-panel ${open ? 'open' : ''}`}>
      <div className="tweaks-title">
        Tweaks
        <button className="tweaks-close" onClick={() => setOpen(false)}>×</button>
      </div>

      <div className="tweak-row">
        <label className="tweak-label">Accent color</label>
        <div className="swatch-row">
          {accents.map(c => (
            <button key={c} className={`swatch ${tweaks.accent === c ? 'active' : ''}`}
              style={{ background: c }}
              onClick={() => set('accent', c)} />
          ))}
        </div>
      </div>

      <div className="tweak-row">
        <label className="tweak-label">Motion</label>
        <div className="toggle-row">
          <button className={`tog-btn ${tweaks.motion ? 'on' : ''}`} onClick={() => set('motion', true)}>On</button>
          <button className={`tog-btn ${!tweaks.motion ? 'on' : ''}`} onClick={() => set('motion', false)}>Off</button>
        </div>
      </div>

      <div className="tweak-row">
        <label className="tweak-label">Language</label>
        <div className="toggle-row">
          <button className={`tog-btn ${(tweaks.lang || 'es') === 'es' ? 'on' : ''}`} onClick={() => set('lang', 'es')}>ES</button>
          <button className={`tog-btn ${tweaks.lang === 'en' ? 'on' : ''}`} onClick={() => set('lang', 'en')}>EN</button>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState(() => localStorage.getItem('pt.page2') || 'landing');
  const [tweaks, setTweaks] = useState(() => {
    try { const s = JSON.parse(localStorage.getItem('pt.tweaks2')); return s || TWEAKS_DEFAULTS; }
    catch { return TWEAKS_DEFAULTS; }
  });

  useEffect(() => { localStorage.setItem('pt.page2', page); }, [page]);
  useEffect(() => {
    localStorage.setItem('pt.tweaks2', JSON.stringify(tweaks));
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    document.documentElement.style.setProperty('--font-body', 'Epilogue, sans-serif');
    document.documentElement.style.setProperty('--font-display', 'Epilogue, sans-serif');
    document.documentElement.style.setProperty('--font-display-weight', '700');
    document.documentElement.style.setProperty('--font-body-weight', '400');
    document.body.classList.toggle('motion-off', !tweaks.motion);
    document.documentElement.lang = tweaks.lang || 'es';
  }, [tweaks]);

  const lang = tweaks.lang || 'es';
  const t = I18N[lang] || I18N.es;

  return (
    <LangContext.Provider value={{ lang, t }}>
      <Nav page={page} setPage={setPage} tweaks={tweaks} setTweaks={setTweaks} />
      <div style={{ opacity: 1, transition: 'opacity 300ms' }}>
        {page === 'landing'   && <Landing setPage={setPage} motion={tweaks.motion} />}
        {page === 'portfolio' && <Portfolio motion={tweaks.motion} />}
        {page === 'about'     && <About setPage={setPage} />}
        {page === 'contact'   && <Contact />}
      </div>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
